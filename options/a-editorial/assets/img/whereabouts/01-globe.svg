<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 585" role="img" aria-label="Whereabouts — daily puzzle, the 3D globe">
  <defs>
    <radialGradient id="g_globe" cx="38%" cy="36%" r="64%">
      <stop offset="0%"   stop-color="#5B6F4E"/>
      <stop offset="35%"  stop-color="#3F5238"/>
      <stop offset="65%"  stop-color="#2A3B26"/>
      <stop offset="100%" stop-color="#0E160C"/>
    </radialGradient>
    <radialGradient id="g_ocean" cx="38%" cy="36%" r="64%">
      <stop offset="0%"   stop-color="#2A4258"/>
      <stop offset="60%"  stop-color="#152434"/>
      <stop offset="100%" stop-color="#08111B"/>
    </radialGradient>
    <radialGradient id="g_atm" cx="50%" cy="50%" r="60%">
      <stop offset="80%" stop-color="rgba(232,123,58,0)"/>
      <stop offset="100%" stop-color="rgba(232,123,58,0.45)"/>
    </radialGradient>
    <linearGradient id="g_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#241914"/>
      <stop offset="60%"  stop-color="#1C1512"/>
      <stop offset="100%" stop-color="#120D0B"/>
    </linearGradient>
    <radialGradient id="g_pin" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFD9A0"/>
      <stop offset="60%"  stop-color="#F2B84B"/>
      <stop offset="100%" stop-color="#E87B3A"/>
    </radialGradient>
    <clipPath id="clip_screen"><rect x="0" y="0" width="270" height="585" rx="22" ry="22"/></clipPath>
    <clipPath id="clip_globe"><circle cx="135" cy="278" r="108"/></clipPath>
  </defs>

  <g clip-path="url(#clip_screen)">
    <!-- Background -->
    <rect width="270" height="585" fill="url(#g_bg)"/>

    <!-- Status bar -->
    <text x="20" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#F9EDD9">9:41</text>
    <g transform="translate(225, 14)" fill="#F9EDD9">
      <rect x="0"  y="3" width="3" height="6" rx="1"/>
      <rect x="5"  y="1" width="3" height="8" rx="1"/>
      <rect x="10" y="-1" width="3" height="10" rx="1"/>
      <circle cx="20" cy="5" r="3" stroke="#F9EDD9" stroke-width="1" fill="none"/>
      <rect x="28" y="0" width="14" height="9" rx="2" stroke="#F9EDD9" stroke-width="1" fill="none"/>
      <rect x="29" y="1.5" width="11" height="6" rx="1" fill="#F9EDD9"/>
    </g>

    <!-- App header -->
    <text x="20" y="56" font-family="Inter, sans-serif" font-size="9" font-weight="600" letter-spacing="2" fill="rgba(249,237,217,0.5)">DAILY · TUESDAY</text>
    <text x="20" y="80" font-family="Newsreader, Georgia, serif" font-size="26" font-weight="400" fill="#F9EDD9" letter-spacing="-0.5">Round 3 of 5</text>
    <text x="20" y="100" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="rgba(249,237,217,0.7)">Find: Reykjavík</text>

    <!-- Streak/XP chip -->
    <g transform="translate(190, 60)">
      <rect x="0" y="0" width="60" height="38" rx="19" fill="rgba(249,237,217,0.06)" stroke="rgba(249,237,217,0.16)"/>
      <text x="10" y="15" font-family="Inter, sans-serif" font-size="8" font-weight="600" letter-spacing="1.5" fill="rgba(249,237,217,0.5)">STREAK</text>
      <text x="10" y="30" font-family="Newsreader, Georgia, serif" font-size="14" font-weight="500" fill="#F2B84B">42 days</text>
    </g>

    <!-- Globe atmosphere glow -->
    <circle cx="135" cy="278" r="135" fill="url(#g_atm)" opacity="0.6"/>

    <!-- The globe — sphere with subtle gradient ocean and continents -->
    <circle cx="135" cy="278" r="108" fill="url(#g_ocean)"/>
    <g clip-path="url(#clip_globe)">
      <!-- Continents drawn with warm earth tones -->
      <!-- North America -->
      <path d="M 60 220 Q 65 200 78 195 Q 95 198 105 215 Q 110 235 100 252 Q 88 268 72 260 Q 58 252 60 235 Z"
            fill="#7A6443" opacity="0.95"/>
      <!-- Greenland -->
      <path d="M 110 198 Q 120 192 128 200 Q 130 215 118 220 Q 108 215 110 200 Z"
            fill="#8B7350" opacity="0.85"/>
      <!-- Europe -->
      <path d="M 138 218 Q 150 215 162 220 Q 168 230 162 240 Q 152 245 142 240 Q 135 230 138 218 Z"
            fill="#7A6443" opacity="0.95"/>
      <!-- Africa -->
      <path d="M 145 248 Q 160 250 168 268 Q 172 290 165 312 Q 152 326 138 318 Q 130 300 132 280 Q 138 258 145 248 Z"
            fill="#8B7350" opacity="0.95"/>
      <!-- Asia (slim crescent) -->
      <path d="M 170 220 Q 195 215 210 232 Q 215 250 205 262 Q 188 268 175 256 Q 168 240 170 220 Z"
            fill="#7A6443" opacity="0.92"/>
      <!-- South America -->
      <path d="M 95 290 Q 105 290 110 305 Q 115 332 105 350 Q 92 358 85 342 Q 82 318 90 300 Z"
            fill="#7A6443" opacity="0.9"/>
      <!-- Australia -->
      <path d="M 195 305 Q 215 302 222 315 Q 220 328 205 330 Q 192 325 195 305 Z"
            fill="#8B7350" opacity="0.85"/>

      <!-- Latitude lines -->
      <g stroke="rgba(249,237,217,0.07)" fill="none" stroke-width="0.6">
        <ellipse cx="135" cy="220" rx="105" ry="14"/>
        <ellipse cx="135" cy="248" rx="108" ry="22"/>
        <ellipse cx="135" cy="278" rx="108" ry="30"/>
        <ellipse cx="135" cy="308" rx="108" ry="22"/>
        <ellipse cx="135" cy="336" rx="105" ry="14"/>
      </g>
      <!-- Longitude meridian -->
      <g stroke="rgba(249,237,217,0.06)" fill="none" stroke-width="0.6">
        <ellipse cx="135" cy="278" rx="14" ry="108"/>
        <ellipse cx="135" cy="278" rx="42" ry="108"/>
        <ellipse cx="135" cy="278" rx="72" ry="108"/>
      </g>

      <!-- Specular highlight -->
      <ellipse cx="100" cy="240" rx="40" ry="28" fill="rgba(255,235,200,0.18)"/>
    </g>

    <!-- Globe rim -->
    <circle cx="135" cy="278" r="108" fill="none" stroke="rgba(232,123,58,0.4)" stroke-width="1"/>
    <circle cx="135" cy="278" r="108" fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="0.5" transform="translate(0.5,0.5)"/>

    <!-- Pin dropped on Iceland (approx upper-left of Europe area) -->
    <g transform="translate(125, 218)">
      <circle cx="0" cy="14" r="14" fill="rgba(232,123,58,0.18)"/>
      <circle cx="0" cy="14" r="8" fill="rgba(232,123,58,0.32)"/>
      <path d="M 0 0 C -6 0 -10 4 -10 10 C -10 18 0 28 0 28 C 0 28 10 18 10 10 C 10 4 6 0 0 0 Z"
            fill="url(#g_pin)" stroke="#1C1512" stroke-width="0.8"/>
      <circle cx="0" cy="10" r="3" fill="#1C1512"/>
    </g>

    <!-- Bottom info bar -->
    <g transform="translate(20, 425)">
      <text font-family="Inter, sans-serif" font-size="9" font-weight="600" letter-spacing="2" fill="rgba(249,237,217,0.5)">YOUR PIN</text>
      <text y="20" font-family="Newsreader, Georgia, serif" font-size="20" font-weight="400" fill="#F9EDD9">64.14° N · 21.94° W</text>
      <text y="40" font-family="Newsreader, Georgia, serif" font-size="13" font-style="italic" fill="rgba(249,237,217,0.65)">about 312 km from the answer</text>
    </g>

    <!-- Submit button -->
    <g transform="translate(20, 490)">
      <rect x="0" y="0" width="230" height="52" rx="26" fill="#E87B3A"/>
      <text x="115" y="32" font-family="Inter, sans-serif" font-size="14" font-weight="600" letter-spacing="0.5" text-anchor="middle" fill="#1C1512">Drop pin · Round 3</text>
    </g>

    <!-- Tab bar progress dots -->
    <g transform="translate(95, 558)">
      <circle cx="0"  cy="0" r="4" fill="#E87B3A"/>
      <circle cx="14" cy="0" r="4" fill="#E87B3A"/>
      <circle cx="28" cy="0" r="4" fill="#F2B84B"/>
      <circle cx="42" cy="0" r="3" fill="rgba(249,237,217,0.25)"/>
      <circle cx="56" cy="0" r="3" fill="rgba(249,237,217,0.25)"/>
    </g>
  </g>
</svg>
