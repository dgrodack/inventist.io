<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 585" role="img" aria-label="Whereabouts — leaderboard">
  <defs>
    <linearGradient id="l_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#241914"/>
      <stop offset="100%" stop-color="#120D0B"/>
    </linearGradient>
    <clipPath id="l_screen"><rect x="0" y="0" width="270" height="585" rx="22" ry="22"/></clipPath>
  </defs>

  <g clip-path="url(#l_screen)">
    <rect width="270" height="585" fill="url(#l_bg)"/>

    <!-- Status -->
    <text x="20" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#F9EDD9">9:41</text>
    <g transform="translate(225, 14)" fill="#F9EDD9">
      <rect x="0"  y="3" width="3" height="6" rx="1"/>
      <rect x="5"  y="1" width="3" height="8" rx="1"/>
      <rect x="10" y="-1" width="3" height="10" rx="1"/>
      <circle cx="20" cy="5" r="3" stroke="#F9EDD9" stroke-width="1" fill="none"/>
      <rect x="28" y="0" width="14" height="9" rx="2" stroke="#F9EDD9" stroke-width="1" fill="none"/>
      <rect x="29" y="1.5" width="11" height="6" rx="1" fill="#F9EDD9"/>
    </g>

    <!-- Header -->
    <text x="20" y="58" font-family="Inter, sans-serif" font-size="9" font-weight="600" letter-spacing="2" fill="rgba(249,237,217,0.5)">WEEK OF APR 22</text>
    <text x="20" y="92" font-family="Newsreader, Georgia, serif" font-size="34" font-weight="380" fill="#F9EDD9" letter-spacing="-0.5">The</text>
    <text x="20" y="124" font-family="Newsreader, Georgia, serif" font-size="34" font-weight="380" font-style="italic" fill="#E87B3A" letter-spacing="-0.5">leaderboard.</text>

    <!-- Tabs -->
    <g transform="translate(20, 152)">
      <rect x="0" y="0" width="74" height="26" rx="13" fill="#E87B3A"/>
      <text x="37" y="17" font-family="Inter, sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#1C1512">Weekly</text>
      <text x="105" y="17" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="0.3" fill="rgba(249,237,217,0.5)">All-time</text>
      <text x="170" y="17" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="0.3" fill="rgba(249,237,217,0.5)">Friends</text>
    </g>

    <!-- Top three "podium" -->
    <g transform="translate(20, 198)">
      <!-- 1st -->
      <g transform="translate(80, 0)">
        <circle r="22" fill="#F2B84B"/>
        <text y="6" font-family="Newsreader, Georgia, serif" font-size="22" font-style="italic" font-weight="380" text-anchor="middle" fill="#1C1512">1</text>
        <text y="42" font-family="Newsreader, Georgia, serif" font-size="13" font-weight="420" text-anchor="middle" fill="#F9EDD9">Mara K.</text>
        <text y="56" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="0.5" text-anchor="middle" fill="#F2B84B">12,840 xp</text>
      </g>
      <!-- 2nd -->
      <g transform="translate(20, 18)">
        <circle r="18" fill="rgba(249,237,217,0.4)"/>
        <text y="5" font-family="Newsreader, Georgia, serif" font-size="18" font-style="italic" font-weight="380" text-anchor="middle" fill="#1C1512">2</text>
        <text y="38" font-family="Newsreader, Georgia, serif" font-size="12" font-weight="420" text-anchor="middle" fill="#F9EDD9">Owen P.</text>
        <text y="50" font-family="Inter, sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" text-anchor="middle" fill="rgba(249,237,217,0.7)">11,420</text>
      </g>
      <!-- 3rd -->
      <g transform="translate(140, 18)">
        <circle r="18" fill="#E87B3A" opacity="0.7"/>
        <text y="5" font-family="Newsreader, Georgia, serif" font-size="18" font-style="italic" font-weight="380" text-anchor="middle" fill="#1C1512">3</text>
        <text y="38" font-family="Newsreader, Georgia, serif" font-size="12" font-weight="420" text-anchor="middle" fill="#F9EDD9">Sade L.</text>
        <text y="50" font-family="Inter, sans-serif" font-size="9" font-weight="600" letter-spacing="0.5" text-anchor="middle" fill="rgba(249,237,217,0.7)">10,790</text>
      </g>
    </g>

    <!-- Divider -->
    <line x1="20" y1="298" x2="250" y2="298" stroke="rgba(249,237,217,0.1)" stroke-width="0.5"/>

    <!-- List rows -->
    <g font-family="Inter, sans-serif" fill="#F9EDD9">
      <g transform="translate(20, 320)">
        <text font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="rgba(249,237,217,0.6)">04</text>
        <text x="36" font-family="Newsreader, Georgia, serif" font-size="15" font-weight="420">Hina T.</text>
        <text x="230" font-size="12" font-weight="540" text-anchor="end" fill="#F9EDD9">9,840</text>
        <line x1="0" y1="14" x2="230" y2="14" stroke="rgba(249,237,217,0.06)"/>
      </g>
      <g transform="translate(20, 348)">
        <text font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="rgba(249,237,217,0.6)">05</text>
        <text x="36" font-family="Newsreader, Georgia, serif" font-size="15" font-weight="420">Andrés R.</text>
        <text x="230" font-size="12" font-weight="540" text-anchor="end" fill="#F9EDD9">9,210</text>
        <line x1="0" y1="14" x2="230" y2="14" stroke="rgba(249,237,217,0.06)"/>
      </g>
      <g transform="translate(20, 376)">
        <text font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="rgba(249,237,217,0.6)">06</text>
        <text x="36" font-family="Newsreader, Georgia, serif" font-size="15" font-weight="420">Bea V.</text>
        <text x="230" font-size="12" font-weight="540" text-anchor="end" fill="#F9EDD9">8,920</text>
        <line x1="0" y1="14" x2="230" y2="14" stroke="rgba(249,237,217,0.06)"/>
      </g>
      <g transform="translate(20, 404)">
        <text font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="rgba(249,237,217,0.6)">07</text>
        <text x="36" font-family="Newsreader, Georgia, serif" font-size="15" font-weight="420">Felix N.</text>
        <text x="230" font-size="12" font-weight="540" text-anchor="end" fill="#F9EDD9">8,640</text>
        <line x1="0" y1="14" x2="230" y2="14" stroke="rgba(249,237,217,0.06)"/>
      </g>

      <!-- You row, highlighted -->
      <g transform="translate(0, 432)">
        <rect x="10" y="0" width="250" height="34" rx="8" fill="rgba(232,123,58,0.12)" stroke="rgba(232,123,58,0.4)"/>
        <text x="20" y="22" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="#E87B3A">08</text>
        <text x="56" y="22" font-family="Newsreader, Georgia, serif" font-size="15" font-weight="420" fill="#F9EDD9">You</text>
        <text x="92" y="22" font-family="Inter, sans-serif" font-size="9" font-weight="600" letter-spacing="1.5" fill="#F2B84B">↑ 3 THIS WEEK</text>
        <text x="250" y="22" font-size="12" font-weight="540" text-anchor="end" fill="#F9EDD9">8,420</text>
      </g>
    </g>

    <!-- Stat rail at bottom -->
    <g transform="translate(20, 500)">
      <text font-family="Inter, sans-serif" font-size="9" font-weight="600" letter-spacing="2" fill="rgba(249,237,217,0.5)">YOUR WEEK</text>
      <line x1="0" y1="14" x2="230" y2="14" stroke="rgba(249,237,217,0.16)"/>

      <g transform="translate(0, 32)">
        <text font-family="Newsreader, Georgia, serif" font-size="22" font-weight="380" fill="#F9EDD9">7/7</text>
        <text x="0" y="18" font-family="Inter, sans-serif" font-size="9" letter-spacing="1" fill="rgba(249,237,217,0.5)">PUZZLES PLAYED</text>
      </g>
      <g transform="translate(82, 32)">
        <text font-family="Newsreader, Georgia, serif" font-size="22" font-weight="380" font-style="italic" fill="#F2B84B">82%</text>
        <text x="0" y="18" font-family="Inter, sans-serif" font-size="9" letter-spacing="1" fill="rgba(249,237,217,0.5)">ACCURACY</text>
      </g>
      <g transform="translate(160, 32)">
        <text font-family="Newsreader, Georgia, serif" font-size="22" font-weight="380" fill="#E87B3A">2:48</text>
        <text x="0" y="18" font-family="Inter, sans-serif" font-size="9" letter-spacing="1" fill="rgba(249,237,217,0.5)">AVG. TIME</text>
      </g>
    </g>
  </g>
</svg>
