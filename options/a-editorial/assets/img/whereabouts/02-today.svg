<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 585" role="img" aria-label="Whereabouts — today's edition">
  <defs>
    <linearGradient id="t_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2A1F1A"/>
      <stop offset="50%"  stop-color="#1C1512"/>
      <stop offset="100%" stop-color="#120D0B"/>
    </linearGradient>
    <radialGradient id="t_sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F2B84B"/>
      <stop offset="60%"  stop-color="#E87B3A"/>
      <stop offset="100%" stop-color="rgba(232,123,58,0)"/>
    </radialGradient>
    <clipPath id="t_screen"><rect x="0" y="0" width="270" height="585" rx="22" ry="22"/></clipPath>
  </defs>

  <g clip-path="url(#t_screen)">
    <rect width="270" height="585" fill="url(#t_bg)"/>

    <!-- Status -->
    <text x="20" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#F9EDD9">9:41</text>
    <g transform="translate(225, 14)" fill="#F9EDD9">
      <rect x="0"  y="3" width="3" height="6" rx="1"/>
      <rect x="5"  y="1" width="3" height="8" rx="1"/>
      <rect x="10" y="-1" width="3" height="10" rx="1"/>
      <circle cx="20" cy="5" r="3" stroke="#F9EDD9" stroke-width="1" fill="none"/>
      <rect x="28" y="0" width="14" height="9" rx="2" stroke="#F9EDD9" stroke-width="1" fill="none"/>
      <rect x="29" y="1.5" width="11" height="6" rx="1" fill="#F9EDD9"/>
    </g>

    <!-- Masthead -->
    <text x="20" y="58" font-family="Inter, sans-serif" font-size="9" font-weight="600" letter-spacing="2" fill="rgba(249,237,217,0.5)">TODAY · APR 26</text>
    <line x1="20" y1="68" x2="250" y2="68" stroke="rgba(249,237,217,0.16)" stroke-width="0.5"/>

    <!-- Display headline -->
    <text x="20" y="120" font-family="Newsreader, Georgia, serif" font-size="46" font-weight="380" fill="#F9EDD9" letter-spacing="-1">Good</text>
    <text x="20" y="160" font-family="Newsreader, Georgia, serif" font-size="46" font-weight="380" font-style="italic" fill="#E87B3A" letter-spacing="-1">morning,</text>
    <text x="20" y="200" font-family="Newsreader, Georgia, serif" font-size="46" font-weight="380" fill="#F9EDD9" letter-spacing="-1">explorer.</text>

    <text x="20" y="232" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="rgba(249,237,217,0.65)">Today's puzzle is ready —</text>
    <text x="20" y="250" font-family="Newsreader, Georgia, serif" font-size="14" font-style="italic" fill="rgba(249,237,217,0.65)">five rounds, about three minutes.</text>

    <!-- Featured pack card (sun behind) -->
    <g transform="translate(20, 280)">
      <rect x="0" y="0" width="230" height="138" rx="14" fill="#2A1F1A" stroke="rgba(249,237,217,0.10)"/>
      <circle cx="180" cy="70" r="60" fill="url(#t_sun)" opacity="0.8"/>
      <text x="16" y="26" font-family="Inter, sans-serif" font-size="9" font-weight="600" letter-spacing="2" fill="rgba(249,237,217,0.5)">FEATURED PACK · NO. 12</text>
      <text x="16" y="60" font-family="Newsreader, Georgia, serif" font-size="22" font-weight="420" fill="#F9EDD9">Ring of Fire</text>
      <text x="16" y="80" font-family="Newsreader, Georgia, serif" font-size="13" font-style="italic" fill="rgba(249,237,217,0.65)">28 volcanoes around</text>
      <text x="16" y="96" font-family="Newsreader, Georgia, serif" font-size="13" font-style="italic" fill="rgba(249,237,217,0.65)">the Pacific rim.</text>
      <g transform="translate(16, 110)">
        <rect x="0" y="0" width="84" height="22" rx="11" fill="#E87B3A"/>
        <text x="42" y="14" font-family="Inter, sans-serif" font-size="10" font-weight="600" text-anchor="middle" fill="#1C1512">Begin →</text>
      </g>
    </g>

    <!-- Streak / XP / Badges row -->
    <g transform="translate(20, 442)">
      <rect x="0" y="0" width="72" height="80" rx="10" fill="rgba(249,237,217,0.05)" stroke="rgba(249,237,217,0.1)"/>
      <text x="10" y="18" font-family="Inter, sans-serif" font-size="8" font-weight="600" letter-spacing="1.5" fill="rgba(249,237,217,0.5)">STREAK</text>
      <text x="10" y="48" font-family="Newsreader, Georgia, serif" font-size="32" font-weight="380" fill="#F2B84B">42</text>
      <text x="10" y="68" font-family="Newsreader, Georgia, serif" font-size="11" font-style="italic" fill="rgba(249,237,217,0.6)">days</text>
    </g>
    <g transform="translate(99, 442)">
      <rect x="0" y="0" width="72" height="80" rx="10" fill="rgba(249,237,217,0.05)" stroke="rgba(249,237,217,0.1)"/>
      <text x="10" y="18" font-family="Inter, sans-serif" font-size="8" font-weight="600" letter-spacing="1.5" fill="rgba(249,237,217,0.5)">XP</text>
      <text x="10" y="48" font-family="Newsreader, Georgia, serif" font-size="32" font-weight="380" fill="#F9EDD9">8,420</text>
      <text x="10" y="68" font-family="Newsreader, Georgia, serif" font-size="11" font-style="italic" fill="rgba(249,237,217,0.6)">total</text>
    </g>
    <g transform="translate(178, 442)">
      <rect x="0" y="0" width="72" height="80" rx="10" fill="rgba(249,237,217,0.05)" stroke="rgba(249,237,217,0.1)"/>
      <text x="10" y="18" font-family="Inter, sans-serif" font-size="8" font-weight="600" letter-spacing="1.5" fill="rgba(249,237,217,0.5)">BADGES</text>
      <g transform="translate(10, 38)">
        <circle cx="6"  cy="6" r="6" fill="#E87B3A"/>
        <circle cx="22" cy="6" r="6" fill="#F2B84B"/>
        <circle cx="38" cy="6" r="6" fill="rgba(249,237,217,0.25)"/>
      </g>
      <text x="10" y="68" font-family="Newsreader, Georgia, serif" font-size="11" font-style="italic" fill="rgba(249,237,217,0.6)">17 earned</text>
    </g>

    <!-- Tab bar -->
    <g transform="translate(0, 540)">
      <line x1="20" y1="0" x2="250" y2="0" stroke="rgba(249,237,217,0.10)" stroke-width="0.5"/>
      <g transform="translate(40, 18)">
        <circle r="4" fill="#E87B3A"/>
        <text x="0" y="20" font-family="Inter, sans-serif" font-size="8" font-weight="600" letter-spacing="1" text-anchor="middle" fill="#E87B3A">TODAY</text>
      </g>
      <g transform="translate(105, 18)">
        <circle r="3" fill="rgba(249,237,217,0.4)"/>
        <text x="0" y="20" font-family="Inter, sans-serif" font-size="8" font-weight="600" letter-spacing="1" text-anchor="middle" fill="rgba(249,237,217,0.5)">PACKS</text>
      </g>
      <g transform="translate(170, 18)">
        <circle r="3" fill="rgba(249,237,217,0.4)"/>
        <text x="0" y="20" font-family="Inter, sans-serif" font-size="8" font-weight="600" letter-spacing="1" text-anchor="middle" fill="rgba(249,237,217,0.5)">STATS</text>
      </g>
      <g transform="translate(235, 18)">
        <circle r="3" fill="rgba(249,237,217,0.4)"/>
        <text x="0" y="20" font-family="Inter, sans-serif" font-size="8" font-weight="600" letter-spacing="1" text-anchor="middle" fill="rgba(249,237,217,0.5)">YOU</text>
      </g>
    </g>
  </g>
</svg>
