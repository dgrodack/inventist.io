<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="Inventist — App Stack concept">
  <!-- Three rounded-square "app tiles" stacked, suggesting a studio of apps -->
  <rect x="6"  y="22" width="32" height="32" rx="8" fill="currentColor" opacity="0.32"/>
  <rect x="16" y="14" width="32" height="32" rx="8" fill="currentColor" opacity="0.62"/>
  <rect x="26" y="6"  width="32" height="32" rx="8" fill="currentColor"/>
  <!-- Subtle highlight on the top tile -->
  <rect x="30" y="10" width="6" height="6" rx="2" fill="var(--bg, #FFFFFF)" opacity="0.55"/>
</svg>
