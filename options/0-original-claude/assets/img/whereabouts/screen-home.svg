<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 585" role="img" aria-label="Whereabouts Home screen">
  <defs>
    <linearGradient id="bg-h" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#271D19"/>
      <stop offset="1" stop-color="#1C1512"/>
    </linearGradient>
    <linearGradient id="card-h" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E87B3A"/>
      <stop offset="1" stop-color="#F2B84B"/>
    </linearGradient>
    <radialGradient id="globe-h" cx="0.4" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#3a2a1f"/>
      <stop offset="1" stop-color="#1a0e08"/>
    </radialGradient>
  </defs>

  <rect width="270" height="585" fill="url(#bg-h)"/>

  <!-- Status bar -->
  <text x="22" y="24" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" font-weight="600" fill="#F9EDD9">9:41</text>
  <g transform="translate(220,15)" fill="#F9EDD9">
    <rect x="0" y="2" width="3" height="8" rx="1"/>
    <rect x="5" y="0" width="3" height="10" rx="1"/>
    <rect x="10" y="-2" width="3" height="12" rx="1"/>
    <rect x="20" y="0" width="20" height="9" rx="2" fill="none" stroke="#F9EDD9" stroke-width="0.8"/>
    <rect x="22" y="2" width="14" height="5" rx="0.5"/>
  </g>

  <!-- Greeting -->
  <text x="22" y="64" font-family="-apple-system,SF Pro Display,sans-serif" font-size="13" font-weight="500" fill="#F9EDD9" opacity="0.55">Saturday, April 26</text>
  <text x="22" y="88" font-family="-apple-system,SF Pro Display,sans-serif" font-size="22" font-weight="700" fill="#F9EDD9" letter-spacing="-0.5">Today's puzzle</text>

  <!-- Hero card -->
  <rect x="14" y="108" width="242" height="220" rx="22" fill="url(#card-h)"/>
  <circle cx="200" cy="180" r="68" fill="url(#globe-h)" opacity="0.92"/>
  <!-- Continents abstraction -->
  <path d="M150 170 q 12 -16 30 -10 q 14 6 8 22 q -12 12 -28 6 q -14 -4 -10 -18 z" fill="#E87B3A" opacity="0.6"/>
  <path d="M195 200 q 16 -8 30 -2 q 12 8 4 18 q -10 10 -24 4 q -14 -8 -10 -20 z" fill="#F2B84B" opacity="0.5"/>
  <!-- Pin -->
  <circle cx="218" cy="166" r="5" fill="#F9EDD9"/>
  <circle cx="218" cy="166" r="2.5" fill="#1C1512"/>
  <!-- Card text -->
  <text x="34" y="148" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" font-weight="700" fill="#2A1408" letter-spacing="1.2">DAILY · COUNTRIES</text>
  <text x="34" y="178" font-family="-apple-system,SF Pro Display,sans-serif" font-size="20" font-weight="700" fill="#2A1408" letter-spacing="-0.4">Where is Madagascar?</text>
  <text x="34" y="200" font-family="-apple-system,SF Pro Text,sans-serif" font-size="12" fill="#2A1408" opacity="0.78">5 rounds · ~3 min</text>
  <!-- Play CTA -->
  <rect x="34" y="282" width="100" height="34" rx="17" fill="#1C1512" opacity="0.92"/>
  <text x="84" y="304" font-family="-apple-system,SF Pro Text,sans-serif" font-size="13" font-weight="600" fill="#F9EDD9" text-anchor="middle">▶  Play now</text>

  <!-- Stat strip -->
  <rect x="14" y="350" width="242" height="72" rx="18" fill="#271D19" stroke="#3A2C24" stroke-width="0.8"/>
  <g font-family="-apple-system,SF Pro Display,sans-serif" fill="#F9EDD9">
    <text x="44" y="378" font-size="10" font-weight="600" opacity="0.55" text-anchor="middle" letter-spacing="0.6">STREAK</text>
    <text x="44" y="404" font-size="22" font-weight="700" text-anchor="middle">12</text>
    <text x="135" y="378" font-size="10" font-weight="600" opacity="0.55" text-anchor="middle" letter-spacing="0.6">XP</text>
    <text x="135" y="404" font-size="22" font-weight="700" text-anchor="middle">3,420</text>
    <text x="226" y="378" font-size="10" font-weight="600" opacity="0.55" text-anchor="middle" letter-spacing="0.6">RANK</text>
    <text x="226" y="404" font-size="22" font-weight="700" text-anchor="middle">#48</text>
  </g>

  <!-- Modes -->
  <text x="22" y="450" font-family="-apple-system,SF Pro Display,sans-serif" font-size="14" font-weight="700" fill="#F9EDD9">Practice modes</text>
  <g font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" font-weight="600">
    <rect x="14"  y="462" width="115" height="44" rx="12" fill="#2A1F1A" stroke="#3A2C24" stroke-width="0.8"/>
    <text x="26" y="480" fill="#F2B84B">🌍 Countries</text>
    <text x="26" y="498" fill="#F9EDD9" opacity="0.55" font-size="10">200 nations</text>

    <rect x="141" y="462" width="115" height="44" rx="12" fill="#2A1F1A" stroke="#3A2C24" stroke-width="0.8"/>
    <text x="153" y="480" fill="#F2B84B">🏛 Capitals</text>
    <text x="153" y="498" fill="#F9EDD9" opacity="0.55" font-size="10">200 cities</text>

    <rect x="14"  y="514" width="115" height="44" rx="12" fill="#2A1F1A" stroke="#3A2C24" stroke-width="0.8"/>
    <text x="26" y="532" fill="#F2B84B">🏙 Cities</text>
    <text x="26" y="550" fill="#F9EDD9" opacity="0.55" font-size="10">500 places</text>

    <rect x="141" y="514" width="115" height="44" rx="12" fill="#2A1F1A" stroke="#3A2C24" stroke-width="0.8"/>
    <text x="153" y="532" fill="#F2B84B">📸 Landmarks</text>
    <text x="153" y="550" fill="#F9EDD9" opacity="0.55" font-size="10">285 wonders</text>
  </g>

  <!-- Tab bar -->
  <rect x="0" y="568" width="270" height="17" fill="#0c0908"/>
</svg>
