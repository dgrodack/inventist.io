<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 585" role="img" aria-label="Whereabouts mode picker">
  <rect width="270" height="585" fill="#1C1512"/>
  <text x="22" y="24" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" font-weight="600" fill="#F9EDD9">9:41</text>

  <text x="22" y="68" font-family="-apple-system,SF Pro Display,sans-serif" font-size="13" font-weight="500" fill="#F9EDD9" opacity="0.55">Choose a pack</text>
  <text x="22" y="94" font-family="-apple-system,SF Pro Display,sans-serif" font-size="22" font-weight="700" fill="#F9EDD9" letter-spacing="-0.5">Map shop</text>

  <!-- Pack 1 — featured -->
  <g>
    <rect x="14" y="116" width="242" height="120" rx="20" fill="#2A1F1A" stroke="#3A2C24" stroke-width="0.8"/>
    <rect x="14" y="116" width="86" height="120" rx="20" fill="#2F5D3A"/>
    <text x="57" y="184" font-family="-apple-system,SF Pro Display,sans-serif" font-size="36" text-anchor="middle">🌲</text>
    <text x="116" y="146" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10" font-weight="700" fill="#F2B84B" letter-spacing="1.2">FEATURED</text>
    <text x="116" y="170" font-family="-apple-system,SF Pro Display,sans-serif" font-size="16" font-weight="700" fill="#F9EDD9" letter-spacing="-0.3">Cascade Range</text>
    <text x="116" y="190" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" fill="#F9EDD9" opacity="0.55">42 peaks · Pacific Northwest</text>
    <rect x="116" y="202" width="78" height="26" rx="13" fill="#E87B3A"/>
    <text x="155" y="219" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" font-weight="700" fill="#2A1408" text-anchor="middle">Play pack</text>
  </g>

  <!-- Pack 2 -->
  <g>
    <rect x="14" y="248" width="242" height="120" rx="20" fill="#2A1F1A" stroke="#3A2C24" stroke-width="0.8"/>
    <rect x="14" y="248" width="86" height="120" rx="20" fill="#C44536"/>
    <text x="57" y="316" font-family="-apple-system,SF Pro Display,sans-serif" font-size="36" text-anchor="middle">🌋</text>
    <text x="116" y="278" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10" font-weight="700" fill="#F2B84B" letter-spacing="1.2">PRO PACK</text>
    <text x="116" y="302" font-family="-apple-system,SF Pro Display,sans-serif" font-size="16" font-weight="700" fill="#F9EDD9" letter-spacing="-0.3">Ring of Fire</text>
    <text x="116" y="322" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" fill="#F9EDD9" opacity="0.55">60 active volcanoes</text>
    <rect x="116" y="334" width="92" height="26" rx="13" fill="none" stroke="#F9EDD9" stroke-width="1" opacity="0.6"/>
    <text x="162" y="351" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" font-weight="600" fill="#F9EDD9" text-anchor="middle" opacity="0.85">Unlock with Pro</text>
  </g>

  <!-- Pack 3 -->
  <g>
    <rect x="14" y="380" width="242" height="120" rx="20" fill="#2A1F1A" stroke="#3A2C24" stroke-width="0.8"/>
    <rect x="14" y="380" width="86" height="120" rx="20" fill="#F7D488"/>
    <text x="57" y="448" font-family="-apple-system,SF Pro Display,sans-serif" font-size="36" text-anchor="middle">🗼</text>
    <text x="116" y="410" font-family="-apple-system,SF Pro Text,sans-serif" font-size="10" font-weight="700" fill="#F2B84B" letter-spacing="1.2">NEW</text>
    <text x="116" y="434" font-family="-apple-system,SF Pro Display,sans-serif" font-size="16" font-weight="700" fill="#F9EDD9" letter-spacing="-0.3">World Landmarks</text>
    <text x="116" y="454" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" fill="#F9EDD9" opacity="0.55">285 wonders, towers, ruins</text>
    <rect x="116" y="466" width="78" height="26" rx="13" fill="#E87B3A"/>
    <text x="155" y="483" font-family="-apple-system,SF Pro Text,sans-serif" font-size="11" font-weight="700" fill="#2A1408" text-anchor="middle">Play pack</text>
  </g>

  <!-- Tab bar -->
  <rect x="0" y="514" width="270" height="54" fill="#271D19"/>
  <g font-family="-apple-system,SF Pro Text,sans-serif" font-size="9" font-weight="600" fill="#F9EDD9" opacity="0.55">
    <text x="32"  y="544" text-anchor="middle">Home</text>
    <text x="92"  y="544" text-anchor="middle" fill="#E87B3A" opacity="1">Maps</text>
    <text x="158" y="544" text-anchor="middle">Friends</text>
    <text x="222" y="544" text-anchor="middle">Profile</text>
  </g>
  <rect x="0" y="568" width="270" height="17" fill="#0c0908"/>
  <rect x="100" y="576" width="70" height="3" rx="1.5" fill="#F9EDD9" opacity="0.6"/>
</svg>
