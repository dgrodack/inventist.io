<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 585" width="270" height="585" role="img" aria-label="Whereabouts — Round 3 of 5: globe view, ready to drop a pin">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#231811"/>
      <stop offset="1" stop-color="#1C1512"/>
    </linearGradient>
    <radialGradient id="globeGrad" cx="38%" cy="35%" r="65%">
      <stop offset="0" stop-color="#3A2A20"/>
      <stop offset="0.55" stop-color="#241915"/>
      <stop offset="1" stop-color="#0E0907"/>
    </radialGradient>
    <radialGradient id="globeRim" cx="50%" cy="50%" r="50%">
      <stop offset="0.85" stop-color="rgba(232,123,58,0)"/>
      <stop offset="0.95" stop-color="rgba(232,123,58,0.45)"/>
      <stop offset="1" stop-color="rgba(232,123,58,0.0)"/>
    </radialGradient>
    <clipPath id="globeClip">
      <circle cx="135" cy="295" r="110"/>
    </clipPath>
    <style>
      .ui  { font-family: -apple-system, 'Inter Tight', system-ui, sans-serif; fill: #F9EDD9; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; fill: #B8A38B; font-size: 9px; letter-spacing: 0.7px; text-transform: uppercase; }
      .mute { fill: #B8A38B; }
      .accent { fill: #E87B3A; }
      .gold { fill: #F2B84B; }
    </style>
  </defs>

  <!-- Phone body -->
  <rect x="0" y="0" width="270" height="585" rx="38" fill="url(#bg1)"/>

  <!-- Status bar -->
  <text x="20" y="26" class="mono" style="font-size:10px">9:41</text>
  <g transform="translate(225,18)">
    <rect x="0" y="0" width="22" height="10" rx="2" fill="none" stroke="#F9EDD9" stroke-width="1" opacity="0.85"/>
    <rect x="2" y="2" width="14" height="6" fill="#F9EDD9" opacity="0.85"/>
  </g>
  <!-- Notch -->
  <rect x="105" y="10" width="60" height="22" rx="11" fill="#0A0605"/>

  <!-- Top header -->
  <g transform="translate(20,55)">
    <text x="0" y="14" class="mono" style="font-size:9px">DAILY · 26 APR</text>
    <text x="0" y="40" class="ui" style="font-size:22px; font-weight:600; letter-spacing:-0.7px">Whereabouts</text>
    <!-- Streak chip -->
    <g transform="translate(170,2)">
      <rect x="0" y="0" width="60" height="22" rx="3" fill="#2A1F1A" stroke="#3A2C24"/>
      <circle cx="9" cy="11" r="2.5" class="accent"/>
      <text x="16" y="15" class="ui" style="font-size:10px; letter-spacing:0">17 days</text>
    </g>
  </g>

  <!-- Round indicator pip row -->
  <g transform="translate(20,115)">
    <text x="0" y="0" class="mono">ROUND 3 / 5</text>
    <g transform="translate(0,8)">
      <rect x="0"  y="0" width="42" height="3" fill="#E87B3A"/>
      <rect x="46" y="0" width="42" height="3" fill="#E87B3A"/>
      <rect x="92" y="0" width="42" height="3" fill="#E87B3A" opacity="0.85"/>
      <rect x="138" y="0" width="42" height="3" fill="#3A2C24"/>
      <rect x="184" y="0" width="42" height="3" fill="#3A2C24"/>
    </g>
  </g>

  <!-- Prompt -->
  <g transform="translate(20,150)">
    <text x="0" y="0" class="mono">Find</text>
    <text x="0" y="28" class="ui" style="font-size:24px; font-weight:600; letter-spacing:-0.6px">Reykjavík</text>
    <text x="0" y="46" class="mono" style="text-transform:none; font-size:9px; letter-spacing:0.4px">capital · iceland</text>
  </g>

  <!-- Globe -->
  <g>
    <circle cx="135" cy="295" r="110" fill="url(#globeGrad)"/>
    <g clip-path="url(#globeClip)" opacity="0.85">
      <!-- meridians -->
      <ellipse cx="135" cy="295" rx="20" ry="110" fill="none" stroke="#3A2C24" stroke-width="0.6"/>
      <ellipse cx="135" cy="295" rx="48" ry="110" fill="none" stroke="#3A2C24" stroke-width="0.6"/>
      <ellipse cx="135" cy="295" rx="78" ry="110" fill="none" stroke="#3A2C24" stroke-width="0.6"/>
      <ellipse cx="135" cy="295" rx="100" ry="110" fill="none" stroke="#3A2C24" stroke-width="0.6"/>
      <!-- parallels -->
      <ellipse cx="135" cy="295" rx="110" ry="18" fill="none" stroke="#3A2C24" stroke-width="0.6"/>
      <ellipse cx="135" cy="295" rx="110" ry="46" fill="none" stroke="#3A2C24" stroke-width="0.6"/>
      <ellipse cx="135" cy="295" rx="110" ry="74" fill="none" stroke="#3A2C24" stroke-width="0.6"/>
      <ellipse cx="135" cy="295" rx="110" ry="100" fill="none" stroke="#3A2C24" stroke-width="0.6"/>

      <!-- Continent shapes (warm ochre) -->
      <g fill="#5C3E2A">
        <!-- north america -->
        <path d="M58 230 q14 -28 36 -34 q26 -8 40 14 q12 18 -2 36 q-12 18 -38 22 q-30 4 -36 -38 z"/>
        <!-- south america -->
        <path d="M118 332 q12 -8 18 8 q8 22 -4 50 q-10 22 -22 22 q-12 -2 -10 -36 q2 -28 18 -44 z"/>
        <!-- africa / europe -->
        <path d="M150 260 q18 -10 32 6 q14 18 4 50 q-10 30 -28 38 q-20 8 -24 -16 q-4 -28 4 -52 q4 -14 12 -26 z"/>
        <!-- asia hint -->
        <path d="M196 250 q14 -2 18 14 q4 16 -10 24 q-14 8 -22 -4 q-6 -14 4 -26 q4 -6 10 -8 z"/>
      </g>
      <!-- highlight Iceland-ish: small island near top-left of europe -->
      <circle cx="161" cy="246" r="2.4" fill="#9B6E48"/>
      <circle cx="166" cy="244" r="1.6" fill="#9B6E48"/>
    </g>
    <!-- atmosphere rim -->
    <circle cx="135" cy="295" r="110" fill="url(#globeRim)"/>
    <!-- pin already dropped — slightly off target -->
    <g transform="translate(168,243)">
      <line x1="0" y1="0" x2="0" y2="-22" stroke="#F2B84B" stroke-width="1.2"/>
      <circle cx="0" cy="-24" r="4.2" fill="#F2B84B" stroke="#1C1512" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#F2B84B"/>
    </g>
  </g>

  <!-- Coords readout -->
  <g transform="translate(20,432)">
    <text x="0" y="0" class="mono">PIN · 64.13°N  21.94°W</text>
  </g>

  <!-- CTA -->
  <g transform="translate(20,452)">
    <rect x="0" y="0" width="230" height="46" rx="6" fill="#F9EDD9"/>
    <text x="115" y="29" class="ui" style="fill:#1C1512; font-size:14px; font-weight:600; letter-spacing:-0.3px; text-anchor:middle">Drop pin</text>
  </g>

  <!-- Bottom tabs -->
  <g transform="translate(20,520)">
    <line x1="0" y1="0" x2="230" y2="0" stroke="#3A2C24" stroke-width="1"/>
    <g transform="translate(0,12)">
      <text x="0" y="14" class="mono accent" style="fill:#E87B3A">DAILY</text>
      <text x="60" y="14" class="mono">PACKS</text>
      <text x="115" y="14" class="mono">STREAK</text>
      <text x="180" y="14" class="mono">YOU</text>
    </g>
  </g>

  <!-- Home indicator -->
  <rect x="95" y="568" width="80" height="4" rx="2" fill="#F9EDD9" opacity="0.6"/>
</svg>
