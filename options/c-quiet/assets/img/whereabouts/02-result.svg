<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 585" width="270" height="585" role="img" aria-label="Whereabouts — round result, distance and points reveal">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#231811"/>
      <stop offset="1" stop-color="#1C1512"/>
    </linearGradient>
    <style>
      .ui  { font-family: -apple-system, 'Inter Tight', system-ui, sans-serif; fill: #F9EDD9; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; fill: #B8A38B; font-size: 9px; letter-spacing: 0.7px; text-transform: uppercase; }
      .accent { fill: #E87B3A; }
      .gold { fill: #F2B84B; }
    </style>
    <clipPath id="mapClip">
      <rect x="20" y="180" width="230" height="180" rx="6"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="270" height="585" rx="38" fill="url(#bg2)"/>

  <!-- Status bar -->
  <text x="20" y="26" class="mono" style="font-size:10px">9:41</text>
  <rect x="105" y="10" width="60" height="22" rx="11" fill="#0A0605"/>

  <!-- Header -->
  <g transform="translate(20,55)">
    <text x="0" y="14" class="mono">ROUND 3 — RESULT</text>
    <text x="0" y="50" class="ui" style="font-size:46px; font-weight:600; letter-spacing:-2px; line-height:1">218<tspan style="font-size:18px; fill:#B8A38B; letter-spacing:0"> km</tspan></text>
    <text x="0" y="74" class="mono" style="text-transform:none; font-size:9px; letter-spacing:0.3px">Reykjavík · 64.146°N 21.942°W</text>
  </g>

  <!-- Points pill -->
  <g transform="translate(170,68)">
    <rect x="0" y="0" width="80" height="40" rx="4" fill="#2A1F1A" stroke="#3A2C24"/>
    <text x="9" y="15" class="mono" style="font-size:8px">POINTS</text>
    <text x="9" y="32" class="ui" style="font-size:18px; font-weight:600; letter-spacing:-0.5px; fill:#F2B84B">+ 842</text>
  </g>

  <!-- Map mini, with arc between guess and target -->
  <g>
    <rect x="20" y="180" width="230" height="180" rx="6" fill="#241915" stroke="#3A2C24"/>
    <g clip-path="url(#mapClip)" opacity="0.95">
      <!-- soft latitude lines -->
      <g stroke="#3A2C24" stroke-width="0.6" fill="none">
        <line x1="20" y1="220" x2="250" y2="220"/>
        <line x1="20" y1="260" x2="250" y2="260"/>
        <line x1="20" y1="300" x2="250" y2="300"/>
        <line x1="20" y1="340" x2="250" y2="340"/>
        <line x1="60"  y1="180" x2="60" y2="360"/>
        <line x1="110" y1="180" x2="110" y2="360"/>
        <line x1="160" y1="180" x2="160" y2="360"/>
        <line x1="210" y1="180" x2="210" y2="360"/>
      </g>
      <!-- coastline-ish blob (Iceland) -->
      <path d="M120 240 q22 -18 44 -8 q22 12 18 30 q-4 18 -32 24 q-30 6 -40 -10 q-10 -18 10 -36 z" fill="#5C3E2A"/>
      <!-- guess pin -->
      <g transform="translate(178,240)">
        <line x1="0" y1="0" x2="0" y2="-16" stroke="#F2B84B" stroke-width="1.2"/>
        <circle cx="0" cy="-18" r="4" fill="#F2B84B"/>
      </g>
      <!-- target pin -->
      <g transform="translate(140,260)">
        <line x1="0" y1="0" x2="0" y2="-16" stroke="#E87B3A" stroke-width="1.2"/>
        <circle cx="0" cy="-18" r="4" fill="#E87B3A"/>
      </g>
      <!-- arc connecting the two -->
      <path d="M178 240 Q 159 215 140 260" stroke="#E87B3A" stroke-width="1" fill="none" stroke-dasharray="2 3"/>
    </g>
    <!-- legend -->
    <g transform="translate(28,348)">
      <circle cx="0" cy="0" r="3" class="gold"/>
      <text x="8" y="3" class="mono" style="font-size:8px">YOU</text>
      <circle cx="44" cy="0" r="3" class="accent"/>
      <text x="52" y="3" class="mono" style="font-size:8px">REYKJAVÍK</text>
    </g>
  </g>

  <!-- Stats grid -->
  <g transform="translate(20,386)">
    <line x1="0" y1="0" x2="230" y2="0" stroke="#3A2C24"/>
    <g transform="translate(0,16)">
      <text x="0" y="0" class="mono">DISTANCE</text>
      <text x="0" y="22" class="ui" style="font-size:16px; font-weight:600; letter-spacing:-0.4px">218 km</text>
    </g>
    <g transform="translate(80,16)">
      <text x="0" y="0" class="mono">SPEED</text>
      <text x="0" y="22" class="ui" style="font-size:16px; font-weight:600; letter-spacing:-0.4px">11.4 s</text>
    </g>
    <g transform="translate(160,16)">
      <text x="0" y="0" class="mono">BONUS</text>
      <text x="0" y="22" class="ui" style="font-size:16px; font-weight:600; letter-spacing:-0.4px; fill:#F2B84B">×1.4</text>
    </g>
    <line x1="0" y1="58" x2="230" y2="58" stroke="#3A2C24"/>
  </g>

  <!-- CTA -->
  <g transform="translate(20,464)">
    <rect x="0" y="0" width="230" height="46" rx="6" fill="#F9EDD9"/>
    <text x="115" y="29" class="ui" style="fill:#1C1512; font-size:14px; font-weight:600; letter-spacing:-0.3px; text-anchor:middle">Continue · Round 4</text>
  </g>

  <!-- Bottom tabs -->
  <g transform="translate(20,520)">
    <line x1="0" y1="0" x2="230" y2="0" stroke="#3A2C24" stroke-width="1"/>
    <g transform="translate(0,12)">
      <text x="0" y="14" class="mono accent" style="fill:#E87B3A">DAILY</text>
      <text x="60" y="14" class="mono">PACKS</text>
      <text x="115" y="14" class="mono">STREAK</text>
      <text x="180" y="14" class="mono">YOU</text>
    </g>
  </g>

  <rect x="95" y="568" width="80" height="4" rx="2" fill="#F9EDD9" opacity="0.6"/>
</svg>
