<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160" role="img" aria-label="Inventist — Cut-I wordmark">
  <defs>
    <style>
      .w { font-family: 'Inter Tight', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 132px; letter-spacing: -7px; fill: #0B0B0C; }
      .accent { fill: #1840FF; }
      .label { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; letter-spacing: 1.2px; fill: #6E6E73; text-transform: uppercase; }
    </style>
    <clipPath id="bowl">
      <rect x="0" y="0" width="720" height="160"/>
    </clipPath>
  </defs>

  <!-- 'I' as a bar that has been "cut" — the dot is the gap -->
  <g clip-path="url(#bowl)" transform="translate(20,30)">
    <!-- I -->
    <rect x="0" y="0" width="22" height="118" fill="#0B0B0C"/>
    <!-- The cut: the I has been split, the gap signals 'invent' -->
    <rect x="0" y="48" width="22" height="14" fill="#F6F4EE"/>
    <rect x="0" y="48" width="22" height="14" fill="#1840FF" opacity="0.9"/>
    <!-- nventist -->
    <text x="40" y="118" class="w">nventist</text>
  </g>
</svg>
