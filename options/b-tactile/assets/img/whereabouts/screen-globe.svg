<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 585" role="img" aria-label="Whereabouts — the 3D globe round in progress">
  <defs>
    <linearGradient id="ph-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2C24"/>
      <stop offset="1" stop-color="#1C1512"/>
    </linearGradient>
    <radialGradient id="g-globe" cx=".42" cy=".38" r=".75">
      <stop offset="0" stop-color="#5DA0A8"/>
      <stop offset=".5" stop-color="#2F7B82"/>
      <stop offset="1" stop-color="#0F3035"/>
    </radialGradient>
    <linearGradient id="g-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E87B3A" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#E87B3A" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="ph-clip"><rect x="6" y="6" width="258" height="573" rx="44"/></clipPath>
  </defs>

  <!-- phone body -->
  <rect x="2" y="2" width="266" height="581" rx="48" fill="#0E0907" stroke="#3A2C24" stroke-width="1.4"/>
  <rect x="6" y="6" width="258" height="573" rx="44" fill="url(#ph-bg)"/>

  <g clip-path="url(#ph-clip)">
    <!-- status bar -->
    <text x="26" y="32" font-family="Geist, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F9EDD9">9:41</text>
    <g transform="translate(218 22)">
      <rect x="0" y="0" width="22" height="11" rx="2" fill="none" stroke="#F9EDD9" stroke-width="1"/>
      <rect x="2" y="2" width="16" height="7" rx="1" fill="#F9EDD9"/>
      <rect x="22" y="3" width="2" height="5" rx="1" fill="#F9EDD9"/>
    </g>
    <!-- dynamic island -->
    <rect x="100" y="18" width="70" height="22" rx="11" fill="#000"/>

    <!-- top header band -->
    <text x="20" y="78" font-family="Geist, system-ui, sans-serif" font-size="11" font-weight="600" fill="#C7B69A" letter-spacing="1.4">DAILY · APRIL 26</text>
    <text x="20" y="106" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="22" font-weight="700" fill="#F9EDD9" letter-spacing="-0.4">Round 3 of 5</text>

    <!-- streak badge -->
    <g transform="translate(196 70)">
      <rect x="0" y="0" width="58" height="32" rx="16" fill="#2A1F1A" stroke="#4A3729"/>
      <text x="14" y="20" font-family="Geist, system-ui, sans-serif" font-size="14" font-weight="700" fill="#F2B84B">12</text>
      <text x="32" y="20" font-size="14" fill="#F9EDD9">🔥</text>
    </g>

    <!-- prompt card -->
    <g transform="translate(20 130)">
      <rect x="0" y="0" width="230" height="56" rx="18" fill="#2A1F1A" stroke="#4A3729"/>
      <text x="16" y="22" font-family="Geist, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8A7560" letter-spacing="1.2">FIND THE CITY</text>
      <text x="16" y="44" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="20" font-weight="700" fill="#F9EDD9">Reykjavík, Iceland</text>
    </g>

    <!-- the globe stage -->
    <g transform="translate(135 350)">
      <!-- subtle outer glow -->
      <circle r="160" fill="url(#g-glow)" opacity="0.7"/>
      <!-- the planet -->
      <circle r="118" fill="url(#g-globe)" stroke="#0E0907" stroke-width="2"/>
      <!-- continents (abstracted, tactile) -->
      <g fill="#3D6A4A">
        <path d="M-78 -42 Q -50 -64 -22 -52 Q -12 -36 -28 -22 Q -50 -10 -64 -28 Z"/>
        <path d="M-12 6 Q 14 -6 36 8 Q 32 32 14 36 Q -8 32 -12 6 Z"/>
        <path d="M48 -38 Q 72 -44 86 -22 Q 78 -8 60 -10 Q 50 -22 48 -38 Z"/>
        <path d="M-46 32 Q -22 28 -8 50 Q -16 70 -38 64 Q -52 50 -46 32 Z"/>
        <path d="M44 36 Q 70 30 84 56 Q 70 76 50 70 Q 38 56 44 36 Z"/>
      </g>
      <g fill="#2D5238" opacity="0.6">
        <path d="M0 -58 Q 14 -68 28 -60 Q 24 -50 12 -52 Q 2 -50 0 -58 Z"/>
      </g>
      <!-- meridians -->
      <ellipse rx="118" ry="44" fill="none" stroke="#F9EDD9" stroke-width="0.6" opacity="0.35"/>
      <ellipse rx="118" ry="74" fill="none" stroke="#F9EDD9" stroke-width="0.5" opacity="0.22"/>
      <ellipse rx="44" ry="118" fill="none" stroke="#F9EDD9" stroke-width="0.5" opacity="0.22"/>
      <!-- equator highlight -->
      <ellipse rx="118" ry="6" fill="#F9EDD9" opacity="0.06"/>

      <!-- player's dropped pin trail -->
      <path d="M -42 -64 Q -10 -82 24 -70" stroke="#F2B84B" stroke-width="1.6" stroke-dasharray="3 3" fill="none" opacity="0.7"/>

      <!-- the active pin -->
      <g transform="translate(-30 -78)">
        <path d="M0 0 C 8 0 12 5 12 12 C 12 20 0 36 0 36 C 0 36 -12 20 -12 12 C -12 5 -8 0 0 0 Z" fill="#E87B3A" stroke="#1C1512" stroke-width="1.6"/>
        <circle cy="12" r="4" fill="#F9EDD9"/>
      </g>

      <!-- smaller secondary pin (target hint) -->
      <g transform="translate(-22 -80)" opacity="0.4">
        <circle r="3" fill="#F2B84B"/>
        <circle r="10" fill="none" stroke="#F2B84B" stroke-width="0.8" stroke-dasharray="2 2"/>
      </g>
    </g>

    <!-- rotation hint -->
    <g transform="translate(135 510)">
      <text x="0" y="0" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-size="11" fill="#8A7560" letter-spacing="0.8">drag to spin · pinch to zoom</text>
    </g>

    <!-- bottom CTA -->
    <g transform="translate(20 532)">
      <rect x="0" y="0" width="230" height="42" rx="21" fill="#E87B3A"/>
      <text x="115" y="27" text-anchor="middle" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="15" font-weight="700" fill="#1C1108">Drop pin</text>
    </g>
  </g>
</svg>
