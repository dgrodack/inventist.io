<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 585" role="img" aria-label="Whereabouts — themed map packs">
  <defs>
    <linearGradient id="p-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2C24"/>
      <stop offset="1" stop-color="#1C1512"/>
    </linearGradient>
    <linearGradient id="p-cascade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5DA0A8"/>
      <stop offset="1" stop-color="#2A4A50"/>
    </linearGradient>
    <linearGradient id="p-fire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2B84B"/>
      <stop offset="1" stop-color="#8B2814"/>
    </linearGradient>
    <linearGradient id="p-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9B8AC9"/>
      <stop offset="1" stop-color="#3D2D5E"/>
    </linearGradient>
    <clipPath id="p-clip"><rect x="6" y="6" width="258" height="573" rx="44"/></clipPath>
  </defs>

  <rect x="2" y="2" width="266" height="581" rx="48" fill="#0E0907" stroke="#3A2C24" stroke-width="1.4"/>
  <rect x="6" y="6" width="258" height="573" rx="44" fill="url(#p-bg)"/>

  <g clip-path="url(#p-clip)">
    <text x="26" y="32" font-family="Geist, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F9EDD9">9:41</text>
    <rect x="100" y="18" width="70" height="22" rx="11" fill="#000"/>

    <!-- header -->
    <text x="20" y="78" font-family="Geist, system-ui, sans-serif" font-size="11" font-weight="600" fill="#C7B69A" letter-spacing="1.4">EXPLORE</text>
    <text x="20" y="106" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="24" font-weight="700" fill="#F9EDD9" letter-spacing="-0.6">Map packs</text>
    <text x="20" y="124" font-family="Instrument Serif, Georgia, serif" font-style="italic" font-size="13" fill="#C7B69A">a curated trip every month</text>

    <!-- search pill -->
    <g transform="translate(20 138)">
      <rect width="230" height="32" rx="16" fill="#2A1F1A" stroke="#4A3729"/>
      <circle cx="18" cy="16" r="5" fill="none" stroke="#8A7560" stroke-width="1.4"/>
      <line x1="22" y1="20" x2="26" y2="24" stroke="#8A7560" stroke-width="1.4" stroke-linecap="round"/>
      <text x="34" y="20" font-family="Geist, system-ui, sans-serif" font-size="11" fill="#8A7560">Search packs</text>
    </g>

    <!-- pack: Cascade Peaks -->
    <g transform="translate(20 184)">
      <rect width="230" height="98" rx="20" fill="url(#p-cascade)"/>
      <!-- mountain illustration -->
      <g>
        <path d="M0 98 L40 50 L70 78 L110 38 L160 80 L200 60 L230 98 Z" fill="#1F3A40"/>
        <path d="M40 50 L52 64 L46 64 Z M110 38 L122 52 L116 52 Z" fill="#F9EDD9" opacity="0.7"/>
        <circle cx="190" cy="22" r="10" fill="#F9EDD9" opacity="0.5"/>
      </g>
      <text x="14" y="22" font-family="Geist, system-ui, sans-serif" font-size="9" font-weight="600" fill="#F9EDD9" letter-spacing="1" opacity="0.8">FREE</text>
      <text x="14" y="78" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="18" font-weight="700" fill="#F9EDD9">Cascade Peaks</text>
      <text x="14" y="92" font-family="Geist, system-ui, sans-serif" font-size="10" fill="#F9EDD9" opacity="0.85">12 alpine summits</text>
    </g>

    <!-- pack: Ring of Fire -->
    <g transform="translate(20 296)">
      <rect width="230" height="98" rx="20" fill="url(#p-fire)"/>
      <!-- volcano + lava arcs -->
      <g>
        <path d="M0 98 L60 60 L100 98 Z" fill="#3A1408" opacity="0.6"/>
        <path d="M120 98 L180 50 L230 98 Z" fill="#3A1408" opacity="0.7"/>
        <path d="M170 50 L172 44 M180 50 L184 38 M190 50 L196 46" stroke="#F9EDD9" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
        <circle cx="180" cy="36" r="3" fill="#F9EDD9" opacity="0.6"/>
        <path d="M180 50 Q 190 40 198 48" stroke="#FBF4E6" stroke-width="1" fill="none" opacity="0.5"/>
      </g>
      <g transform="translate(186 14)">
        <rect width="34" height="14" rx="7" fill="#1C1108" opacity="0.5"/>
        <text x="17" y="10" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-size="8" font-weight="700" fill="#F2B84B">PRO</text>
      </g>
      <text x="14" y="76" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="18" font-weight="700" fill="#F9EDD9">Ring of Fire</text>
      <text x="14" y="90" font-family="Geist, system-ui, sans-serif" font-size="10" fill="#F9EDD9" opacity="0.85">24 active volcanoes</text>
    </g>

    <!-- pack: World Lighthouses -->
    <g transform="translate(20 408)">
      <rect width="230" height="98" rx="20" fill="url(#p-light)"/>
      <!-- lighthouse silhouette -->
      <g>
        <path d="M0 98 L0 90 Q 80 82 230 88 L230 98 Z" fill="#1F1A2A" opacity="0.6"/>
        <g transform="translate(160 38)">
          <rect x="-3" y="0" width="14" height="50" fill="#F9EDD9"/>
          <rect x="-1" y="6" width="10" height="6" fill="#D9482E"/>
          <rect x="-1" y="22" width="10" height="6" fill="#D9482E"/>
          <rect x="-5" y="0" width="18" height="6" rx="2" fill="#1C1512"/>
          <rect x="-1" y="-10" width="10" height="10" fill="#F2B84B"/>
          <path d="M9 -5 L26 -8 M9 -2 L28 -2 M9 1 L26 4" stroke="#F2B84B" stroke-width="1" opacity="0.7"/>
        </g>
      </g>
      <g transform="translate(186 14)">
        <rect width="34" height="14" rx="7" fill="#1C1108" opacity="0.5"/>
        <text x="17" y="10" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-size="8" font-weight="700" fill="#F2B84B">PRO</text>
      </g>
      <text x="14" y="76" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="18" font-weight="700" fill="#F9EDD9">World Lighthouses</text>
      <text x="14" y="90" font-family="Geist, system-ui, sans-serif" font-size="10" fill="#F9EDD9" opacity="0.85">36 coastal beacons</text>
    </g>

    <!-- bottom tab bar -->
    <g transform="translate(0 542)">
      <rect x="0" y="0" width="270" height="44" fill="#1C1512" opacity="0.6"/>
      <g font-family="Geist, system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">
        <g><circle cx="34" cy="18" r="6" fill="none" stroke="#8A7560" stroke-width="1.4"/><text x="34" y="36" fill="#8A7560">Today</text></g>
        <g><rect x="86" y="12" width="12" height="12" rx="2" fill="#E87B3A"/><text x="92" y="36" fill="#E87B3A">Packs</text></g>
        <g transform="translate(140 12)"><circle r="6" cy="6" fill="none" stroke="#8A7560" stroke-width="1.4"/><circle r="2" cy="6" fill="#8A7560"/><text x="0" y="24" text-anchor="middle" fill="#8A7560">Stats</text></g>
        <g transform="translate(190 12)"><path d="M-6 6 L0 0 L6 6" stroke="#8A7560" stroke-width="1.4" fill="none"/><text x="0" y="24" text-anchor="middle" fill="#8A7560">Top</text></g>
        <g transform="translate(238 12)"><circle r="6" cy="6" fill="none" stroke="#8A7560" stroke-width="1.4"/><text x="0" y="24" text-anchor="middle" fill="#8A7560">Me</text></g>
      </g>
    </g>
  </g>
</svg>
