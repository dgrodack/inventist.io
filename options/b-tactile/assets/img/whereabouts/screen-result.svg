<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 585" role="img" aria-label="Whereabouts — round result with score and distance">
  <defs>
    <linearGradient id="r-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2C24"/>
      <stop offset="1" stop-color="#1C1512"/>
    </linearGradient>
    <linearGradient id="r-celebrate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2B84B" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#F2B84B" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="r-globe" cx=".42" cy=".38" r=".75">
      <stop offset="0" stop-color="#5DA0A8"/>
      <stop offset=".5" stop-color="#2F7B82"/>
      <stop offset="1" stop-color="#0F3035"/>
    </radialGradient>
    <clipPath id="r-clip"><rect x="6" y="6" width="258" height="573" rx="44"/></clipPath>
  </defs>

  <rect x="2" y="2" width="266" height="581" rx="48" fill="#0E0907" stroke="#3A2C24" stroke-width="1.4"/>
  <rect x="6" y="6" width="258" height="573" rx="44" fill="url(#r-bg)"/>

  <g clip-path="url(#r-clip)">
    <!-- status -->
    <text x="26" y="32" font-family="Geist, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F9EDD9">9:42</text>
    <rect x="100" y="18" width="70" height="22" rx="11" fill="#000"/>

    <!-- celebration glow -->
    <ellipse cx="135" cy="120" rx="180" ry="120" fill="url(#r-celebrate)"/>

    <!-- confetti -->
    <g>
      <rect x="46" y="68" width="6" height="3" rx="1.5" fill="#E87B3A" transform="rotate(-20 49 70)"/>
      <rect x="218" y="78" width="6" height="3" rx="1.5" fill="#9B8AC9" transform="rotate(35 220 80)"/>
      <rect x="60" y="120" width="5" height="3" rx="1.5" fill="#6E9B7B" transform="rotate(15 62 122)"/>
      <rect x="200" y="140" width="5" height="3" rx="1.5" fill="#F2B84B" transform="rotate(-30 202 142)"/>
      <circle cx="32" cy="100" r="2" fill="#F2B84B"/>
      <circle cx="240" cy="60" r="2" fill="#E87B3A"/>
      <circle cx="220" cy="170" r="2" fill="#F9EDD9" opacity="0.6"/>
    </g>

    <!-- score callout -->
    <g transform="translate(135 130)" text-anchor="middle">
      <text font-family="Geist, system-ui, sans-serif" font-size="11" font-weight="600" fill="#F2B84B" letter-spacing="2">VERY CLOSE!</text>
      <text y="58" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="64" font-weight="700" fill="#F9EDD9" letter-spacing="-3">+862</text>
      <text y="82" font-family="Geist, system-ui, sans-serif" font-size="12" fill="#C7B69A">XP earned this round</text>
    </g>

    <!-- target city pill -->
    <g transform="translate(20 240)">
      <rect x="0" y="0" width="230" height="44" rx="14" fill="#2A1F1A" stroke="#4A3729"/>
      <circle cx="22" cy="22" r="6" fill="#E87B3A"/>
      <text x="38" y="20" font-family="Geist, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8A7560" letter-spacing="1">TARGET</text>
      <text x="38" y="34" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="13" font-weight="700" fill="#F9EDD9">Reykjavík, Iceland</text>
      <text x="184" y="20" font-family="Geist, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8A7560" letter-spacing="1">OFF BY</text>
      <text x="184" y="34" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="13" font-weight="700" fill="#F2B84B">38 km</text>
    </g>

    <!-- mini globe with line between guess and target -->
    <g transform="translate(135 380)">
      <circle r="86" fill="url(#r-globe)" stroke="#0E0907" stroke-width="1.6"/>
      <g fill="#3D6A4A">
        <path d="M-56 -30 Q -36 -46 -16 -38 Q -10 -26 -22 -16 Q -36 -8 -46 -20 Z"/>
        <path d="M-8 4 Q 12 -4 26 6 Q 22 24 12 26 Q -8 22 -8 4 Z"/>
        <path d="M34 -28 Q 52 -32 60 -16 Q 56 -6 44 -8 Q 36 -16 34 -28 Z"/>
      </g>
      <ellipse rx="86" ry="32" fill="none" stroke="#F9EDD9" stroke-width="0.5" opacity="0.3"/>

      <!-- guess and target connection -->
      <path d="M -32 -50 Q -10 -68 8 -54" stroke="#F2B84B" stroke-width="1.6" fill="none" stroke-dasharray="3 2"/>
      <circle cx="-32" cy="-50" r="5" fill="#9B8AC9" stroke="#F9EDD9" stroke-width="1.4"/>
      <g transform="translate(8 -60)">
        <path d="M0 0 C 6 0 9 4 9 9 C 9 14 0 26 0 26 C 0 26 -9 14 -9 9 C -9 4 -6 0 0 0 Z" fill="#E87B3A" stroke="#1C1512" stroke-width="1.4"/>
        <circle cy="9" r="3" fill="#F9EDD9"/>
      </g>
    </g>

    <!-- next button -->
    <g transform="translate(20 510)">
      <rect x="0" y="0" width="230" height="42" rx="21" fill="#F2B84B"/>
      <text x="115" y="27" text-anchor="middle" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="15" font-weight="700" fill="#2A1F0E">Next round →</text>
    </g>
  </g>
</svg>
