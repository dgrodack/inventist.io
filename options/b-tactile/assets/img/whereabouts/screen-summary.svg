<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 585" role="img" aria-label="Whereabouts — daily summary and share card">
  <defs>
    <linearGradient id="su-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2C24"/>
      <stop offset="1" stop-color="#1C1512"/>
    </linearGradient>
    <linearGradient id="su-card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E87B3A"/>
      <stop offset="1" stop-color="#D9482E"/>
    </linearGradient>
    <clipPath id="su-clip"><rect x="6" y="6" width="258" height="573" rx="44"/></clipPath>
  </defs>

  <rect x="2" y="2" width="266" height="581" rx="48" fill="#0E0907" stroke="#3A2C24" stroke-width="1.4"/>
  <rect x="6" y="6" width="258" height="573" rx="44" fill="url(#su-bg)"/>

  <g clip-path="url(#su-clip)">
    <text x="26" y="32" font-family="Geist, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F9EDD9">9:44</text>
    <rect x="100" y="18" width="70" height="22" rx="11" fill="#000"/>

    <!-- close x -->
    <g transform="translate(232 60)">
      <circle r="14" fill="#2A1F1A" stroke="#4A3729"/>
      <path d="M-5 -5 L5 5 M-5 5 L5 -5" stroke="#F9EDD9" stroke-width="1.6" stroke-linecap="round"/>
    </g>

    <!-- header -->
    <text x="20" y="78" font-family="Geist, system-ui, sans-serif" font-size="11" font-weight="600" fill="#F2B84B" letter-spacing="1.4">DAILY COMPLETE</text>
    <text x="20" y="106" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="26" font-weight="700" fill="#F9EDD9" letter-spacing="-0.8">Nicely done.</text>
    <text x="20" y="128" font-family="Instrument Serif, Georgia, serif" font-style="italic" font-size="14" fill="#C7B69A">come back tomorrow for five more</text>

    <!-- shareable card (the heart of the page) -->
    <g transform="translate(20 152)">
      <rect width="230" height="240" rx="22" fill="url(#su-card)"/>
      <!-- subtle pattern -->
      <g opacity="0.2" fill="#F9EDD9">
        <circle cx="40" cy="40" r="2"/>
        <circle cx="200" cy="60" r="2"/>
        <circle cx="180" cy="200" r="2"/>
        <circle cx="60" cy="220" r="2"/>
      </g>
      <!-- date -->
      <text x="20" y="32" font-family="Geist, system-ui, sans-serif" font-size="10" font-weight="600" fill="#FBF4E6" letter-spacing="1" opacity="0.85">SUN · APR 26</text>
      <!-- score -->
      <text x="20" y="100" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="64" font-weight="700" fill="#FBF4E6" letter-spacing="-3">4,128</text>
      <text x="20" y="120" font-family="Geist, system-ui, sans-serif" font-size="11" font-weight="600" fill="#FBF4E6" letter-spacing="1" opacity="0.85">XP THIS DAILY</text>

      <!-- 5 round dots -->
      <g transform="translate(20 144)">
        <g font-family="Geist, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1C1108">
          <g><circle cx="14" cy="14" r="13" fill="#FBF4E6"/><text x="14" y="18" text-anchor="middle">1</text></g>
          <g transform="translate(38 0)"><circle cx="14" cy="14" r="13" fill="#FBF4E6"/><text x="14" y="18" text-anchor="middle">2</text></g>
          <g transform="translate(76 0)"><circle cx="14" cy="14" r="13" fill="#F2B84B" stroke="#FBF4E6" stroke-width="2"/><text x="14" y="18" text-anchor="middle">3</text></g>
          <g transform="translate(114 0)"><circle cx="14" cy="14" r="13" fill="#FBF4E6"/><text x="14" y="18" text-anchor="middle">4</text></g>
          <g transform="translate(152 0)"><circle cx="14" cy="14" r="13" fill="#FBF4E6"/><text x="14" y="18" text-anchor="middle">5</text></g>
        </g>
      </g>

      <!-- footer of card -->
      <g transform="translate(20 196)">
        <text font-family="Geist, system-ui, sans-serif" font-size="10" font-weight="600" fill="#FBF4E6" opacity="0.85" letter-spacing="0.6">12-DAY STREAK · 38 KM AVG OFF</text>
      </g>
      <g transform="translate(20 218)">
        <text font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FBF4E6" opacity="0.9">whereabouts · daily geography</text>
      </g>
    </g>

    <!-- breakdown rows -->
    <g transform="translate(20 408)">
      <text font-family="Geist, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8A7560" letter-spacing="1.2">YOUR ROUNDS</text>
      <g transform="translate(0 16)" font-family="Geist, system-ui, sans-serif" font-size="11" fill="#F9EDD9">
        <g><text x="0" y="14" fill="#C7B69A">1.</text><text x="22" y="14" font-weight="600">Tokyo, Japan</text><text x="220" y="14" text-anchor="end" fill="#F2B84B" font-weight="700">982</text></g>
        <g transform="translate(0 22)"><text x="0" y="14" fill="#C7B69A">2.</text><text x="22" y="14" font-weight="600">Madrid, Spain</text><text x="220" y="14" text-anchor="end" fill="#F2B84B" font-weight="700">740</text></g>
        <g transform="translate(0 44)"><text x="0" y="14" fill="#C7B69A">3.</text><text x="22" y="14" font-weight="600">Reykjavík, Iceland</text><text x="220" y="14" text-anchor="end" fill="#F2B84B" font-weight="700">862</text></g>
        <g transform="translate(0 66)"><text x="0" y="14" fill="#C7B69A">4.</text><text x="22" y="14" font-weight="600">Cape Town, ZA</text><text x="220" y="14" text-anchor="end" fill="#F2B84B" font-weight="700">812</text></g>
        <g transform="translate(0 88)"><text x="0" y="14" fill="#C7B69A">5.</text><text x="22" y="14" font-weight="600">Wellington, NZ</text><text x="220" y="14" text-anchor="end" fill="#F2B84B" font-weight="700">732</text></g>
      </g>
    </g>

    <!-- share button -->
    <g transform="translate(20 540)">
      <rect width="230" height="32" rx="16" fill="#F2B84B"/>
      <text x="115" y="20" text-anchor="middle" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="12" font-weight="700" fill="#2A1F0E">Share today's card</text>
    </g>
  </g>
</svg>
