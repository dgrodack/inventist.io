<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 585" role="img" aria-label="Whereabouts — daily streak and badge collection">
  <defs>
    <linearGradient id="s-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2C24"/>
      <stop offset="1" stop-color="#1C1512"/>
    </linearGradient>
    <linearGradient id="s-flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2B84B"/>
      <stop offset=".5" stop-color="#E87B3A"/>
      <stop offset="1" stop-color="#D9482E"/>
    </linearGradient>
    <clipPath id="s-clip"><rect x="6" y="6" width="258" height="573" rx="44"/></clipPath>
  </defs>

  <rect x="2" y="2" width="266" height="581" rx="48" fill="#0E0907" stroke="#3A2C24" stroke-width="1.4"/>
  <rect x="6" y="6" width="258" height="573" rx="44" fill="url(#s-bg)"/>

  <g clip-path="url(#s-clip)">
    <text x="26" y="32" font-family="Geist, system-ui, sans-serif" font-size="13" font-weight="600" fill="#F9EDD9">9:41</text>
    <rect x="100" y="18" width="70" height="22" rx="11" fill="#000"/>

    <!-- header -->
    <text x="20" y="78" font-family="Geist, system-ui, sans-serif" font-size="11" font-weight="600" fill="#C7B69A" letter-spacing="1.4">YOUR JOURNEY</text>
    <text x="20" y="106" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="24" font-weight="700" fill="#F9EDD9" letter-spacing="-0.6">Twelve days strong</text>
    <text x="20" y="126" font-family="Instrument Serif, Georgia, serif" font-style="italic" font-size="14" fill="#F2B84B">a habit, gently kept</text>

    <!-- big flame card -->
    <g transform="translate(20 150)">
      <rect x="0" y="0" width="230" height="160" rx="22" fill="#2A1F1A" stroke="#4A3729"/>
      <!-- flame illustration -->
      <g transform="translate(48 30)">
        <!-- outer flame -->
        <path d="M30 0 C 16 18 8 32 12 50 C 4 50 -2 60 -2 70 C -2 88 12 100 30 100 C 48 100 62 88 62 70 C 62 60 56 50 48 50 C 50 38 44 22 38 14 C 36 22 32 28 28 30 C 32 22 30 8 30 0 Z" fill="url(#s-flame)" stroke="#1C1512" stroke-width="2.4"/>
        <!-- inner flame -->
        <path d="M30 24 C 22 36 18 46 22 56 C 16 58 14 66 14 72 C 14 84 22 92 30 92 C 38 92 46 84 46 72 C 46 64 42 56 36 54 C 38 44 34 32 30 24 Z" fill="#F2B84B" opacity="0.85"/>
      </g>
      <!-- streak count -->
      <text x="150" y="78" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="56" font-weight="700" fill="#F9EDD9" letter-spacing="-2">12</text>
      <text x="150" y="100" font-family="Geist, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8A7560" letter-spacing="1.2">DAY STREAK</text>
      <text x="150" y="130" font-family="Geist, system-ui, sans-serif" font-size="11" fill="#C7B69A">Personal best: 24</text>
    </g>

    <!-- weekly grid -->
    <text x="20" y="338" font-family="Geist, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8A7560" letter-spacing="1.2">THIS WEEK</text>
    <g transform="translate(20 350)">
      <g font-family="Geist, system-ui, sans-serif" font-size="9" fill="#8A7560" text-anchor="middle">
        <text x="14" y="0">M</text><text x="46" y="0">T</text><text x="78" y="0">W</text><text x="110" y="0">T</text><text x="142" y="0">F</text><text x="174" y="0">S</text><text x="206" y="0">S</text>
      </g>
      <g transform="translate(0 8)">
        <!-- completed days -->
        <g><circle cx="14" cy="14" r="13" fill="#E87B3A"/><text x="14" y="18" text-anchor="middle" font-size="11" fill="#1C1108" font-weight="700">✓</text></g>
        <g><circle cx="46" cy="14" r="13" fill="#E87B3A"/><text x="46" y="18" text-anchor="middle" font-size="11" fill="#1C1108" font-weight="700">✓</text></g>
        <g><circle cx="78" cy="14" r="13" fill="#E87B3A"/><text x="78" y="18" text-anchor="middle" font-size="11" fill="#1C1108" font-weight="700">✓</text></g>
        <g><circle cx="110" cy="14" r="13" fill="#E87B3A"/><text x="110" y="18" text-anchor="middle" font-size="11" fill="#1C1108" font-weight="700">✓</text></g>
        <g><circle cx="142" cy="14" r="13" fill="#F2B84B" stroke="#F9EDD9" stroke-width="2"/><text x="142" y="18" text-anchor="middle" font-size="11" fill="#1C1108" font-weight="700">★</text></g>
        <g><circle cx="174" cy="14" r="13" fill="none" stroke="#4A3729" stroke-width="1.4" stroke-dasharray="2 2"/></g>
        <g><circle cx="206" cy="14" r="13" fill="none" stroke="#4A3729" stroke-width="1.4" stroke-dasharray="2 2"/></g>
      </g>
    </g>

    <!-- badges -->
    <text x="20" y="418" font-family="Geist, system-ui, sans-serif" font-size="11" font-weight="600" fill="#8A7560" letter-spacing="1.2">RECENT BADGES</text>
    <g transform="translate(20 432)">
      <!-- badge 1: Globetrotter -->
      <g transform="translate(0 0)">
        <rect x="0" y="0" width="72" height="92" rx="16" fill="#2A1F1A" stroke="#4A3729"/>
        <circle cx="36" cy="34" r="20" fill="#2F7B82"/>
        <ellipse cx="36" cy="34" rx="20" ry="6" fill="none" stroke="#F9EDD9" stroke-width="0.8" opacity="0.4"/>
        <ellipse cx="36" cy="34" rx="6" ry="20" fill="none" stroke="#F9EDD9" stroke-width="0.8" opacity="0.4"/>
        <text x="36" y="74" text-anchor="middle" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="9" font-weight="700" fill="#F9EDD9">Globetrotter</text>
      </g>
      <!-- badge 2: Capital Idea -->
      <g transform="translate(80 0)">
        <rect x="0" y="0" width="72" height="92" rx="16" fill="#2A1F1A" stroke="#4A3729"/>
        <g transform="translate(36 34)">
          <path d="M-14 6 L0 -16 L14 6 L14 14 L-14 14 Z" fill="#F2B84B" stroke="#1C1512" stroke-width="1.4"/>
          <rect x="-8" y="0" width="4" height="6" fill="#1C1512"/>
          <rect x="4" y="0" width="4" height="6" fill="#1C1512"/>
        </g>
        <text x="36" y="74" text-anchor="middle" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="9" font-weight="700" fill="#F9EDD9">Capital Idea</text>
      </g>
      <!-- badge 3: Locked -->
      <g transform="translate(160 0)">
        <rect x="0" y="0" width="72" height="92" rx="16" fill="#2A1F1A" stroke="#4A3729" stroke-dasharray="3 3"/>
        <g transform="translate(36 34)" opacity="0.5">
          <rect x="-8" y="-2" width="16" height="14" rx="2" fill="none" stroke="#8A7560" stroke-width="2"/>
          <path d="M-5 -2 L-5 -8 Q -5 -14 0 -14 Q 5 -14 5 -8 L5 -2" fill="none" stroke="#8A7560" stroke-width="2"/>
        </g>
        <text x="36" y="74" text-anchor="middle" font-family="Bricolage Grotesque, system-ui, sans-serif" font-size="9" font-weight="700" fill="#8A7560">Locked</text>
      </g>
    </g>

    <!-- bottom CTA -->
    <g transform="translate(20 540)">
      <rect x="0" y="0" width="230" height="32" rx="16" fill="#2A1F1A" stroke="#4A3729"/>
      <text x="115" y="20" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-size="11" font-weight="600" fill="#F2B84B">View leaderboard →</text>
    </g>
  </g>
</svg>
