<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 110" role="img" aria-label="Inventist — wordmark with the dropped pin">
  <defs>
    <linearGradient id="wp-pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2B84B"/>
      <stop offset="1" stop-color="#E87B3A"/>
    </linearGradient>
    <filter id="wp-shad" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
  </defs>
  <g font-family="Bricolage Grotesque, Geist, system-ui, sans-serif" font-weight="700" font-size="74" letter-spacing="-3" fill="#1F1A14">
    <text x="2" y="78">inv</text>
    <!-- replace the dot of i with a real map-pin glyph -->
    <text x="138" y="78">nt</text>
    <text x="220" y="78">i</text>
    <text x="246" y="78">st</text>
  </g>
  <!-- the e is a curled "looking back at you" letter -->
  <g transform="translate(102 26)">
    <path d="M0 32 Q0 8 22 8 Q44 8 44 28 Q44 36 32 36 L8 36 Q12 50 26 50 Q34 50 40 46" stroke="#1F1A14" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- a tiny mountain trail inside the e -->
    <path d="M14 32 L18 26 L22 30 L26 24 L30 30" stroke="#E87B3A" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- The i becomes a pin dropped in the right place -->
  <g transform="translate(225 4)">
    <!-- pin teardrop shape -->
    <path d="M14 4 C 24 4 30 12 30 22 C 30 32 14 50 14 50 C 14 50 -2 32 -2 22 C -2 12 4 4 14 4 Z"
          fill="url(#wp-pin)" stroke="#1F1A14" stroke-width="3" stroke-linejoin="round"/>
    <circle cx="14" cy="22" r="6" fill="#FBF4E6" stroke="#1F1A14" stroke-width="2.4"/>
    <!-- shadow under pin -->
    <ellipse cx="14" cy="56" rx="11" ry="3" fill="#1F1A14" opacity="0.18"/>
  </g>
  <!-- subtle baseline curl -->
  <path d="M2 96 Q 180 102 358 92" stroke="#6E9B7B" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
