<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 110" role="img" aria-label="Inventist — Finch the courier mark">
  <defs>
    <linearGradient id="fn-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E87B3A"/>
      <stop offset="1" stop-color="#D9482E"/>
    </linearGradient>
    <linearGradient id="fn-belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2B84B"/>
      <stop offset="1" stop-color="#E87B3A"/>
    </linearGradient>
  </defs>
  <!-- The mascot: a finch that carries discoveries (like a tiny inventor's apprentice). -->
  <g transform="translate(8 14)">
    <!-- envelope/parcel under wing -->
    <rect x="6" y="56" width="26" height="18" rx="3" fill="#FBF4E6" stroke="#1F1A14" stroke-width="2.6"/>
    <path d="M6 56 L19 66 L32 56" stroke="#1F1A14" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- wax seal on letter -->
    <circle cx="19" cy="68" r="3.2" fill="#D9482E" stroke="#1F1A14" stroke-width="1.4"/>

    <!-- body -->
    <path d="M22 38 C 22 18 42 8 60 12 C 78 16 86 30 84 44 C 82 56 70 64 56 64 C 50 64 44 62 40 60 C 36 58 30 56 22 56 Z" fill="url(#fn-body)" stroke="#1F1A14" stroke-width="3" stroke-linejoin="round"/>
    <!-- belly -->
    <path d="M30 50 C 38 58 56 60 70 54 C 72 50 70 44 64 42 C 50 40 36 44 30 50 Z" fill="url(#fn-belly)"/>

    <!-- wing -->
    <path d="M40 30 C 56 22 72 26 76 38 C 76 44 66 50 56 48 C 48 46 40 38 40 30 Z" fill="#1F1A14"/>
    <path d="M48 32 L56 36 M52 28 L62 32" stroke="#FBF4E6" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>

    <!-- beak (carries a tiny pin) -->
    <path d="M22 36 L8 32 L22 42 Z" fill="#F2B84B" stroke="#1F1A14" stroke-width="2.4" stroke-linejoin="round"/>
    <!-- eye -->
    <circle cx="32" cy="30" r="3.4" fill="#1F1A14"/>
    <circle cx="33" cy="29" r="1.1" fill="#FBF4E6"/>

    <!-- twig perch -->
    <path d="M20 80 Q 50 76 86 84" stroke="#6E9B7B" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- tiny leaf -->
    <path d="M70 72 Q 78 68 82 76 Q 76 80 70 72 Z" fill="#6E9B7B"/>
  </g>

  <!-- wordmark next to mark -->
  <g font-family="Bricolage Grotesque, Geist, system-ui, sans-serif" font-weight="700" font-size="40" letter-spacing="-1.4" fill="#1F1A14">
    <text x="120" y="62">inventist</text>
  </g>
  <text x="120" y="86" font-family="Instrument Serif, Georgia, serif" font-style="italic" font-size="18" fill="#6B5B45" letter-spacing="0.04em">small studio · big curiosity</text>
</svg>
